<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trenér</title>
<meta name="theme-color" content="#22406B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trenér">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<style>
:root{
  --paper:#F4F5F2;
  --card:#FFFFFF;
  --ink:#1B2430;
  --ink-soft:#5B6472;
  --ink-faint:#8A93A0;
  --line:#DCDFD9;
  --court:#22406B;
  --court-dark:#182D4D;
  --chalk:#E8622C;
  --chalk-dark:#C74F1E;
  --ok:#3F8B5C;
  --danger:#C24545;
  --danger-bg:#FBEAEA;

  --part-rozcvicka:#A8C0DE;
  --part-hra:#E8C468;
  --part-dril:#7FB0AC;
  --part-herni:#E39A8A;
  --part-protazeni:#B8A8D4;
  --part-posilovani:#C97B5C;
  --part-kompenzace:#ABA875;
  --part-prestavka:#C7C9C4;

  --radius:12px;
  --radius-sm:7px;
  --shadow:0 1px 2px rgba(27,36,48,.07), 0 4px 14px rgba(27,36,48,.05);
  --font-display:'Bebas Neue', sans-serif;
  --font-body:'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3{font-family:var(--font-display);font-weight:400;letter-spacing:.02em;margin:0;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);font-size:15px;}
a{color:var(--court);}
.hidden{display:none !important;}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:var(--radius-sm);padding:10px 16px;font-size:14px;font-weight:600;
  transition:transform .08s ease, border-color .15s ease, background .15s ease;
}
.btn:active{transform:scale(.97);}
.btn:focus-visible{outline:2px solid var(--court);outline-offset:2px;}
.btn-primary{background:var(--court);border-color:var(--court);color:#fff;}
.btn-primary:hover{background:var(--court-dark);}
.btn-accent{background:var(--chalk);border-color:var(--chalk);color:#fff;}
.btn-accent:hover{background:var(--chalk-dark);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
.btn-ghost:hover{background:rgba(27,36,48,.05);}
.btn-danger{background:var(--danger-bg);border-color:var(--danger-bg);color:var(--danger);}
.btn-sm{padding:6px 11px;font-size:13px;}
.btn-icon{padding:8px;width:36px;height:36px;}
.btn-block{width:100%;}

/* ---------- Login ---------- */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg, var(--court) 0%, var(--court-dark) 100%);
}
.login-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:36px 28px;width:100%;max-width:360px;
}
.login-logo{font-family:var(--font-display);font-size:42px;color:var(--court);text-align:center;letter-spacing:.03em;margin-bottom:2px;}
.login-sub{text-align:center;color:var(--ink-soft);font-size:13px;margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--paper);color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--court);outline-offset:1px;border-color:var(--court);}
.field textarea{resize:vertical;min-height:64px;}
#loginError{color:var(--danger);font-size:13px;margin:8px 0 0;min-height:16px;}
.login-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--ink-soft);}
.login-switch button{background:none;border:none;color:var(--court);font-weight:600;padding:0;text-decoration:underline;}
.forgot-pass{text-align:right;margin:-8px 0 14px;}
.forgot-pass button{background:none;border:none;color:var(--ink-soft);font-size:12.5px;text-decoration:underline;padding:0;}
#loginInfo{color:var(--ok);font-size:13px;margin:8px 0 0;min-height:16px;}

/* ---------- App shell ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}
header.topbar{
  background:var(--court);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
.topbar-title{font-family:var(--font-display);font-size:24px;letter-spacing:.03em;}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,.75);}
.topbar-user button{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;}
nav.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:52px;z-index:19;}
nav.tabs button{
  flex:1;padding:13px 8px;background:none;border:none;font-size:14px;font-weight:600;color:var(--ink-faint);
  border-bottom:3px solid transparent;
}
nav.tabs button.active{color:var(--court);border-bottom-color:var(--chalk);}
main{flex:1;padding:16px;max-width:960px;margin:0 auto;width:100%;}

/* ---------- Toast ---------- */
#toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;
  opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:100;box-shadow:var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- Library toolbar ---------- */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center;}
.toolbar input[type=search]{flex:1;min-width:140px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--card);}
.toolbar select{padding:10px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{
  border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 12px;font-size:12.5px;
  color:var(--ink-soft);font-weight:600;
}
.chip.active{background:var(--court);border-color:var(--court);color:#fff;}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint);}
.empty-state h3{font-size:26px;color:var(--ink-soft);margin-bottom:6px;}

/* ---------- Library grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;
}
.card-thumb{
  aspect-ratio:16/9;background:var(--court) center/cover no-repeat;position:relative;
  display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:11px;
}
.card-thumb .platform-badge{
  position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;
}
.card-body{padding:9px 10px 11px;flex:1;display:flex;flex-direction:column;gap:5px;}
.card-title{font-size:13.5px;font-weight:600;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-folder{font-size:11px;color:var(--chalk-dark);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.card-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-faint);margin-top:auto;}
.stars{color:var(--chalk);letter-spacing:1px;}
.diff-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--line);margin-right:2px;}
.diff-dots span.on{background:var(--court);}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(27,36,48,.5);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
}
@media(min-width:640px){.modal-backdrop{align-items:center;}}
.modal{
  background:var(--card);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  border-radius:var(--radius) var(--radius) 0 0;padding:22px 20px calc(20px + env(safe-area-inset-bottom));
}
@media(min-width:640px){.modal{border-radius:var(--radius);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-head h2{font-size:26px;color:var(--court);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:420px){.two-col{grid-template-columns:1fr;}}
.tag-input-wrap{border:1px solid var(--line);border-radius:var(--radius-sm);padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;background:var(--paper);}
.tag-pill{background:var(--court);color:#fff;font-size:12px;border-radius:999px;padding:3px 9px;display:flex;align-items:center;gap:5px;}
.tag-pill button{background:none;border:none;color:#fff;opacity:.75;font-size:13px;line-height:1;padding:0;}
.tag-input-wrap input{border:none;background:none;flex:1;min-width:70px;padding:3px;}
.tag-input-wrap input:focus{outline:none;}
.diff-picker,.rating-picker{display:flex;gap:6px;}
.diff-picker button,.rating-picker button{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--paper);
  font-size:13px;font-weight:700;color:var(--ink-soft);
}
.diff-picker button.on{background:var(--court);border-color:var(--court);color:#fff;}
.rating-picker button.on{background:var(--chalk);border-color:var(--chalk);color:#fff;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-actions .btn{flex:1;}
.thumb-preview{width:100%;aspect-ratio:16/9;background:var(--paper);border:1px dashed var(--line);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:12px;margin-bottom:8px;background-size:cover;background-position:center;overflow:hidden;}
.thumb-upload-row{display:flex;gap:8px;margin-bottom:12px;}
.thumb-upload-row label.btn{flex:1;text-align:center;}
.thumb-upload-row input[type=file]{display:none;}

.manage-link{background:none;border:none;color:var(--court);font-size:12.5px;font-weight:600;text-decoration:underline;padding:4px 0;}
.manage-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.manage-row .swatch{width:20px;height:20px;border-radius:5px;flex-shrink:0;}
.manage-row input{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--paper);}

.filter-panel{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.filter-panel select{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--paper);font-size:12.5px;}
.filter-panel .chip-row{margin-bottom:0;}
.filter-panel .chip{padding:3px 9px;font-size:11.5px;}
.url-row{display:flex;gap:8px;}
.url-row input{flex:1;}

/* ---------- Detail modal ---------- */
.embed-wrap{width:100%;height:min(70vh,560px);min-height:220px;background:#000;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;}
.embed{width:100%;height:100%;border:0;display:block;}
.fallback-link{display:flex;align-items:center;justify-content:center;height:100%;color:#fff;background:var(--court);text-decoration:none;font-weight:600;}
.detail-title{font-size:24px;margin-bottom:8px;}
.detail-row{margin-bottom:12px;}
.detail-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:700;margin-bottom:4px;}
.detail-text{white-space:pre-wrap;font-size:14px;}

/* ---------- Trainings list ---------- */
.training-row{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;box-shadow:var(--shadow);
}
.training-row-main{flex:1;min-width:0;}
.training-row-title{font-size:17px;font-weight:700;margin-bottom:3px;}
.training-row-meta{font-size:12px;color:var(--ink-faint);}
.training-row-actions{display:flex;gap:6px;flex-shrink:0;}

/* ---------- Editor ---------- */
.editor-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.editor-head input[type=text]{flex:1;min-width:160px;font-size:20px;font-weight:700;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--card);}
.total-badge{
  font-family:var(--font-display);background:var(--court);color:#fff;border-radius:999px;padding:8px 16px;font-size:18px;
  letter-spacing:.03em;white-space:nowrap;
}
.editor-layout{display:grid;grid-template-columns:1fr;gap:18px;}
@media(min-width:860px){.editor-layout{grid-template-columns:280px 1fr;align-items:start;}}
.picker-panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;}
@media(min-width:860px){.picker-panel{position:sticky;top:110px;max-height:calc(100vh - 130px);overflow-y:auto;}}
.picker-panel h3{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-family:var(--font-body);font-weight:700;margin-bottom:8px;}
.picker-item{
  display:flex;gap:8px;align-items:center;padding:7px;border-radius:var(--radius-sm);border:1px solid transparent;
}
.picker-item:hover{background:var(--paper);}
.picker-item img{width:46px;height:30px;object-fit:cover;border-radius:4px;background:var(--line);flex-shrink:0;}
.picker-item-title{font-size:12.5px;font-weight:600;line-height:1.25;flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.picker-item button{flex-shrink:0;}

.sequence{display:flex;flex-direction:column;gap:8px;min-height:60px;}
.seq-item{
  border-radius:var(--radius);padding:10px 12px;position:relative;border:1px solid rgba(0,0,0,.06);
  box-shadow:var(--shadow);
}
.seq-item.is-break{
  background:repeating-linear-gradient(135deg, var(--part-prestavka), var(--part-prestavka) 8px, #d8d9d5 8px, #d8d9d5 16px);
  text-align:center;padding:9px 12px;
}
.seq-item-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.drag-handle{cursor:grab;color:rgba(27,36,48,.4);font-size:15px;padding:2px 4px;touch-action:none;flex-shrink:0;}
.seq-thumb{width:52px;height:34px;object-fit:cover;border-radius:5px;background:rgba(0,0,0,.15);flex-shrink:0;cursor:pointer;}
.seq-title{font-size:13.5px;font-weight:700;flex:1 1 120px;min-width:0;cursor:pointer;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.seq-controls{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-left:auto;}
.seq-part-select{border:1px solid rgba(0,0,0,.15);border-radius:6px;background:rgba(255,255,255,.6);font-size:11px;padding:3px 4px;max-width:96px;}
.seq-duration{width:46px;border:1px solid rgba(0,0,0,.15);border-radius:6px;padding:3px 4px;font-size:12px;text-align:center;}
.seq-item-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
@media(max-width:420px){.seq-item-fields{grid-template-columns:1fr;}}
.seq-item-fields input{border:1px solid rgba(0,0,0,.15);border-radius:6px;padding:5px 7px;font-size:12px;background:rgba(255,255,255,.55);}
.seq-item-fields input::placeholder{color:rgba(27,36,48,.45);}
.break-label{border:none;background:none;font-family:var(--font-display);font-size:16px;letter-spacing:.03em;color:var(--ink-soft);text-align:center;width:60%;}
.seq-remove{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.7);border:none;border-radius:50%;width:22px;height:22px;font-size:13px;color:var(--danger);line-height:1;}
.sortable-ghost{opacity:.35;}
.part-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:11px;color:var(--ink-soft);}
.part-legend span{display:inline-flex;align-items:center;gap:4px;}
.part-swatch{width:10px;height:10px;border-radius:3px;display:inline-block;}
.add-break-btn{margin-top:6px;}

/* Search inside picker */
.picker-search{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--paper);}
.picker-list{display:flex;flex-direction:column;gap:2px;max-height:340px;overflow-y:auto;}
@media(min-width:860px){.picker-list{max-height:none;}}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">TRENÉR</div>
    <div class="login-sub">Knihovna cvičení &amp; skladač tréninků</div>
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="loginPass">Heslo</label>
        <input type="password" id="loginPass" autocomplete="current-password" required minlength="6">
      </div>
      <div class="forgot-pass"><button type="button" id="forgotPassBtn">Zapomenuté heslo?</button></div>
      <p id="loginError"></p>
      <p id="loginInfo"></p>
      <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn"><i class="fa-solid fa-right-to-bracket"></i> Přihlásit se</button>
    </form>
    <div class="login-switch">
      <span id="loginSwitchText">Ještě nemáš účet?</span>
      <button type="button" id="loginSwitchBtn">Založit účet</button>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="topbar-title">TRENÉR</div>
    <div class="topbar-user">
      <span id="userEmailLabel"></span>
      <button id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Odhlásit</button>
    </div>
  </header>
  <nav class="tabs">
    <button data-view="library" class="active"><i class="fa-solid fa-video"></i> Knihovna</button>
    <button data-view="trainings"><i class="fa-solid fa-list-check"></i> Tréninky</button>
  </nav>

  <main>
    <!-- ---------- LIBRARY VIEW ---------- -->
    <section id="libraryView">
      <div class="toolbar">
        <input type="search" id="librarySearch" placeholder="Hledat podle názvu, štítku, složky…">
        <select id="folderFilter"><option value="">Všechny složky</option></select>
        <select id="librarySort">
          <option value="date-desc">Nejnovější</option>
          <option value="date-asc">Nejstarší</option>
          <option value="az">A–Z</option>
          <option value="za">Z–A</option>
        </select>
        <button class="btn btn-accent" id="openAddLinkBtn"><i class="fa-solid fa-plus"></i> Přidat odkaz</button>
      </div>
      <div class="chip-row" id="tagFilterRow"></div>
      <div class="chip-row" id="equipFilterRow"></div>
      <div id="libraryGrid" class="grid"></div>
    </section>

    <!-- ---------- TRAININGS LIST VIEW ---------- -->
    <section id="trainingsView" class="hidden">
      <div class="toolbar">
        <h2 style="flex:1;font-size:24px;color:var(--court);">Tréninky</h2>
        <button class="btn btn-accent" id="newTrainingBtn"><i class="fa-solid fa-plus"></i> Nový trénink</button>
      </div>
      <div id="trainingsList"></div>
    </section>

    <!-- ---------- TRAINING EDITOR VIEW ---------- -->
    <section id="editorView" class="hidden">
      <button class="btn btn-ghost btn-sm" id="backToTrainingsBtn" style="margin-bottom:10px;"><i class="fa-solid fa-arrow-left"></i> Zpět na tréninky</button>
      <div class="editor-head">
        <input type="text" id="trainingNameInput" placeholder="Název tréninku">
        <div class="total-badge" id="totalTimeBadge">0 min</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
        <div class="part-legend" id="partLegend"></div>

      </div>

/* ---- URL parsing ---- */
function detectPlatform(url) {
  try {
    const h = new URL(url).hostname.replace(/^www\./, "").replace(/^m\./, "");
    if (h === "youtube.com" || h === "youtu.be") return "youtube";
    if (h === "facebook.com" || h === "fb.watch") return "facebook";
    if (h === "drive.google.com") return "drive";
    return "other";
  } catch { return "other"; }
}
function extractYouTubeId(url) {
  const patterns = [
    /youtube\.com\/watch\?[^#]*\bv=([\w-]{6,})/,
    /youtu\.be\/([\w-]{6,})/,
    /youtube\.com\/shorts\/([\w-]{6,})/,
    /youtube\.com\/embed\/([\w-]{6,})/
  ];
  for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
  return null;
}
function extractDriveId(url) {
  let m = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
  if (m) return m[1];
  m = url.match(/[?&]id=([\w-]+)/);
  if (m) return m[1];
  return null;
}
function parseTimestampToSeconds(str) {
  if (!str) return null;
  const m = str.trim().match(/^(\d{1,3}):([0-5]\d)$/);
  if (!m) return null;
  return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
}
function secondsToTimestamp(sec) {
  if (sec === null || sec === undefined) return "";
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}
async function fetchYouTubeMeta(url) {
  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if (!res.ok) return null;
    const data = await res.json();
    return { title: data.title || "", thumbnail: data.thumbnail_url || "" };
  } catch { return null; }
}
function renderEmbedHtml(item) {
  if (item.platform === "youtube" && item.videoId) {
    const start = item.timestamp ? `?start=${item.timestamp}` : "";
    return `<iframe class="embed" src="https://www.youtube-nocookie.com/embed/${esc(item.videoId)}${start}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
  }
  if (item.platform === "drive" && item.videoId) {
    return `<iframe class="embed" src="https://drive.google.com/file/d/${esc(item.videoId)}/preview" allow="autoplay" loading="lazy"></iframe>`;
  }
  if (item.platform === "facebook") {
    return `<iframe class="embed" src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(item.url)}&show_text=false" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;
  }
  return `<a class="fallback-link" href="${esc(item.url)}" target="_blank" rel="noopener">Otevřít odkaz ↗</a>`;
}

/* =========================================================

   ========================================================= */
async function loadUserData() {
  try {
    const snap = await getDoc(doc(db, "users", uidCurrent));
    if (snap.exists()) {
      const d = snap.data();
      state = {
        library: d.library || {},
        trainings: d.trainings || {},
        folders: d.folders || [],
        tagPool: d.tagPool || [],
        equipmentPool: d.equipmentPool || [],
        parts: (d.parts && d.parts.length) ? d.parts : structuredClone(DEFAULT_PARTS)
      };
      // migrace ze staršího pevného seznamu částí (protažení/posilování/kompenzace -> Závěr)
      const legacyMap = { protazeni: "zaver", posilovani: "zaver", kompenzace: "zaver" };
      let migrated = false;
      Object.values(state.trainings).forEach(t => {
        (t.items || []).forEach(it => {
          if (legacyMap[it.part]) { it.part = legacyMap[it.part]; migrated = true; }
        });
      });
      Object.values(state.library).forEach(it => {
        if (it.defaultPart === undefined) { it.defaultPart = state.parts[2] ? state.parts[2].key : state.parts[0].key; migrated = true; }
        if (legacyMap[it.defaultPart]) { it.defaultPart = legacyMap[it.defaultPart]; migrated = true; }
      });
      if (!d.parts || !d.parts.length || migrated) scheduleSave();
    } else {
      state = {
        library: {}, trainings: {},
        folders: ["Útok", "Blok", "Nahrávka", "Podání", "Příjem", "Obrana", "Kondice"],
        tagPool: [], equipmentPool: [],
        parts: structuredClone(DEFAULT_PARTS)
      };
      await saveUserData();
    }
  } catch (e) {
    console.error("Nepodařilo se načíst data:", e);
    toast("Nepodařilo se načíst data ze serveru — zkontroluj připojení.");
  }
}
async function saveUserData() {
  if (!uidCurrent) return;
  try {
    await setDoc(doc(db, "users", uidCurrent), state);
  } catch (e) {
    console.error("Nepodařilo se uložit data:", e);
    toast("Uložení se nepovedlo, zkusím to znovu při další změně.");
  }
}

/** Obecný render aktivních filtrovacích chipů (štítky/vybavení, knihovna i editor). */
function renderFilterChips(containerId, pool, filterSet, onChange) {
  const row = document.getElementById(containerId);
  if (!row) return;
  if (!pool.length) { row.innerHTML = ""; return; }
  row.innerHTML = pool.map(t =>
    `<button type="button" class="chip ${filterSet.has(t) ? "active" : ""}" data-val="${esc(t)}">${esc(t)}</button>`
  ).join("");
  row.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const v = chip.dataset.val;
      filterSet.has(v) ? filterSet.delete(v) : filterSet.add(v);
      onChange();
    });
  });
}
function renderTagFilterRow() { renderFilterChips("tagFilterRow", state.tagPool, libraryTagFilter, () => { renderTagFilterRow(); renderEquipFilterRow(); renderLibrary(); }); }
function renderEquipFilterRow() { renderFilterChips("equipFilterRow", state.equipmentPool, libraryEquipFilter, () => { renderTagFilterRow(); renderEquipFilterRow(); renderLibrary(); }); }

function getFilteredLibraryItems() {
  const q = document.getElementById("librarySearch").value.trim().toLowerCase();
  const folder = document.getElementById("folderFilter").value;
  const sortMode = document.getElementById("librarySort").value;
  const items = Object.values(state.library).filter(item => {
    if (folder && item.folder !== folder) return false;
    if (libraryTagFilter.size && ![...libraryTagFilter].every(t => item.tags.includes(t))) return false;
    if (libraryEquipFilter.size && ![...libraryEquipFilter].every(t => item.equipment.includes(t))) return false;
    if (q) {
      const hay = [item.title, item.folder, ...(item.tags || []), item.shortDesc].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  const sorters = {
    "date-desc": (a, b) => (b.dateAdded || 0) - (a.dateAdded || 0),
    "date-asc": (a, b) => (a.dateAdded || 0) - (b.dateAdded || 0),
    "az": (a, b) => a.title.localeCompare(b.title, "cs"),
    "za": (a, b) => b.title.localeCompare(a.title, "cs")
  };
  return items.sort(sorters[sortMode] || sorters["date-desc"]);
}

function normalizeAgainstPool(value, pool) {
  const existing = pool.find(p => p.toLowerCase() === value.toLowerCase());
  return existing || value;
}
function renderTagSuggestions() {

}
function renderEquipSuggestions() {

}
document.getElementById("tagInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === ",") {
    e.preventDefault();
    let v = e.target.value.trim().replace(/,$/, "");
    if (v) {
      v = normalizeAgainstPool(v, state.tagPool);
      if (!formTags.includes(v)) { formTags.push(v); renderTagPills(); }
    }
    e.target.value = "";
  }
});
document.getElementById("equipInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === ",") {
    e.preventDefault();
    let v = e.target.value.trim().replace(/,$/, "");
    if (v) {
      v = normalizeAgainstPool(v, state.equipmentPool);
      if (!formEquip.includes(v)) { formEquip.push(v); renderEquipPills(); }
    }
    e.target.value = "";
  }
});

document.getElementById("thumbFileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (ev) => {
    img.onload = () => {
      const maxW = 480;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
      pendingThumbUpload = dataUrl;
      const tp = document.getElementById("thumbPreview");
      tp.style.backgroundImage = `url('${dataUrl}')`;
      tp.textContent = "";
      toast("Náhled nahrán.");
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function renderPickerList() {
  renderPickerFilterChips();

  const folder = document.getElementById("pickerFolderFilter").value;
  const part = document.getElementById("pickerPartFilter").value;
  const items = Object.values(state.library)
    .filter(it => {
      if (folder && it.folder !== folder) return false;
      if (part && it.defaultPart !== part) return false;
      if (pickerTagFilter.size && ![...pickerTagFilter].every(t => it.tags.includes(t))) return false;
      if (pickerEquipFilter.size && ![...pickerEquipFilter].every(t => it.equipment.includes(t))) return false;
      if (q && !(it.title + " " + it.folder + " " + it.tags.join(" ")).toLowerCase().includes(q)) return false;
      return true;
    })
    .sort((a, b) => (b.dateAdded || 0) - (a.dateAdded || 0));
  const list = document.getElementById("pickerList");
  if (!items.length) { list.innerHTML = `<p style="font-size:12px;color:var(--ink-faint);">Nic nenalezeno — zkus uvolnit filtry.</p>`; return; }

  wrap.innerHTML = t.items.map(row => {
    if (row.part === "prestavka") {
      return `
      <div class="seq-item is-break" data-itemid="${esc(row.itemId)}">
        <span class="drag-handle"><i class="fa-solid fa-grip-lines"></i></span>

        <input class="seq-duration" type="number" min="1" value="${row.duration}" data-field="duration" data-itemid="${esc(row.itemId)}"> min
        <button class="seq-remove" data-remove="${esc(row.itemId)}" aria-label="Odebrat"><i class="fa-solid fa-xmark"></i></button>
      </div>`;
    }
    const lib = state.library[row.videoId];
    const partColor = getPart(row.part).color;
    return `
    <div class="seq-item" data-itemid="${esc(row.itemId)}" style="background:${esc(partColor)}">
      <button class="seq-remove" data-remove="${esc(row.itemId)}" aria-label="Odebrat"><i class="fa-solid fa-xmark"></i></button>
      <div class="seq-item-top">
        <span class="drag-handle"><i class="fa-solid fa-grip-lines"></i></span>
        ${lib && lib.thumbnail ? `<img class="seq-thumb" src="${esc(lib.thumbnail)}" data-open="${esc(row.videoId)}">` : `<div class="seq-thumb" data-open="${esc(row.videoId)}"></div>`}
        <span class="seq-title" data-open="${esc(row.videoId)}">${lib ? esc(lib.title) : "(video smazáno z knihovny)"}</span>
        <div class="seq-controls">
          <select class="seq-part-select" data-field="part" data-itemid="${esc(row.itemId)}">
            ${state.parts.map(p => `<option value="${esc(p.key)}" ${row.part === p.key ? "selected" : ""}>${esc(p.label)}</option>`).join("")}
          </select>
          <input class="seq-duration" type="number" min="1" value="${row.duration}" data-field="duration" data-itemid="${esc(row.itemId)}">
        </div>
      </div>
      <div class="seq-item-fields">
        <input type="text" placeholder="Cue (co říct nahlas)" value="${esc(row.cue)}" data-field="cue" data-itemid="${esc(row.itemId)}">
        <input type="text" placeholder="Poznámka (např. dělat jen 3. cvik)" value="${esc(row.poznamka)}" data-field="poznamka" data-itemid="${esc(row.itemId)}">
      </div>
    </div>`;
  }).join("");

  // znovu-navázat Sortable
  if (sortableInstance) sortableInstance.destroy();
  sortableInstance = Sortable.create(wrap, {
    handle: ".drag-handle",
    animation: 150,
    ghostClass: "sortable-ghost",
    onEnd: () => {
      const order = [...wrap.querySelectorAll(".seq-item")].map(el => el.dataset.itemid);
      const t2 = state.trainings[currentTrainingId];
      t2.items.sort((a, b) => order.indexOf(a.itemId) - order.indexOf(b.itemId));
      t2.dateModified = Date.now();
      scheduleSave();
    }
  });
}

document.getElementById("sequenceList").addEventListener("input", (e) => {
  const field = e.target.dataset.field, itemId = e.target.dataset.itemid;
  if (!field || !itemId) return;
  const t = state.trainings[currentTrainingId];
  const row = t.items.find(it => it.itemId === itemId);
  if (!row) return;
  row[field] = field === "duration" ? (parseInt(e.target.value) || 0) : e.target.value;
  t.dateModified = Date.now();
  scheduleSave();
  if (field === "duration") updateTotalBadge();
  if (field === "part") renderSequence();
});
document.getElementById("sequenceList").addEventListener("click", (e) => {
  const openBtn = e.target.closest("[data-open]");
  if (openBtn && openBtn.dataset.open) { openDetailModal(openBtn.dataset.open); return; }
  const rm = e.target.closest("[data-remove]");
  if (rm) {
    const t = state.trainings[currentTrainingId];
    t.items = t.items.filter(it => it.itemId !== rm.dataset.remove);
    t.dateModified = Date.now();
    scheduleSave();
    renderSequence();
  }
});

document.getElementById("saveTrainingBtn").addEventListener("click", () => { scheduleSave(); toast("Trénink uložen."); switchView("trainings"); });
document.getElementById("deleteTrainingBtn").addEventListener("click", () => {
  if (!confirm("Smazat celý tento trénink?")) return;
  delete state.trainings[currentTrainingId];
  scheduleSave();
  switchView("trainings");
  toast("Smazáno.");
});

/* =========================================================
   SPRÁVA ČÁSTÍ TRÉNINKU
   ========================================================= */
const partsModalBackdrop = document.getElementById("partsModalBackdrop");
document.getElementById("managePartsBtn").addEventListener("click", () => { renderPartsManageList(); partsModalBackdrop.classList.remove("hidden"); });
document.getElementById("closePartsModalBtn").addEventListener("click", () => partsModalBackdrop.classList.add("hidden"));
partsModalBackdrop.addEventListener("click", (e) => { if (e.target === partsModalBackdrop) partsModalBackdrop.classList.add("hidden"); });

function renderPartsManageList() {
  const wrap = document.getElementById("partsManageList");
  wrap.innerHTML = state.parts.map(p => `
    <div class="manage-row">
      <span class="swatch" style="background:${esc(p.color)}"></span>
      <input type="text" value="${esc(p.label)}" data-key="${esc(p.key)}">
    </div>
  `).join("");
  wrap.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("change", () => {
      const p = state.parts.find(x => x.key === inp.dataset.key);
      if (p && inp.value.trim()) { p.label = inp.value.trim(); scheduleSave(); renderPartLegend(); renderPickerList(); if (currentView === "editor") renderSequence(); toast("Uloženo."); }
    });
  });
}
document.getElementById("addPartBtn").addEventListener("click", () => {
  const label = prompt("Název nové části tréninku:");
  if (!label || !label.trim()) return;
  state.parts.push({ key: uid(), label: label.trim(), color: nextPartColor() });
  scheduleSave();
  renderPartsManageList();
  renderPartLegend();
  renderPartSelectOptions();
  renderPickerList();
  toast("Přidáno.");
});

/* =========================================================
   PWA — service worker
   ========================================================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => console.warn("SW registrace selhala:", err));
  });
}
</script>
